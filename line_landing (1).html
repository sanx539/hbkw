<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LINE</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Helvetica Neue", "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    background: #ffffff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
  }
  header { padding: 16px 20px 10px; }
  .header-logo {
    font-size: 21px;
    font-weight: 900;
    color: #06C755;
    letter-spacing: 0.5px;
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
  }
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 24px;
    gap: 30px;
  }
  .line-icon {
    width: 120px;
    height: 120px;
    object-fit: contain;
    display: block;
  }
  .message {
    text-align: center;
    font-size: 21px;
    font-weight: 500;
    color: #000000;
    line-height: 1.65;
    letter-spacing: 0.02em;
  }
  .buttons {
    width: 100%;
    padding: 24px 20px 48px;
    display: flex;
    flex-direction: column;
    gap: 13px;
    margin-top: auto;
  }
  .btn-open {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 58px;
    background: #06C755;
    color: #ffffff;
    font-size: 18px;
    font-weight: 700;
    text-decoration: none;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    letter-spacing: 0.05em;
  }
  .btn-download {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 58px;
    background: #ffffff;
    color: #333333;
    font-size: 18px;
    font-weight: 400;
    text-decoration: none;
    border-radius: 10px;
    border: 1.5px solid #d0d0d0;
    cursor: pointer;
    letter-spacing: 0.05em;
  }
</style>
</head>
